```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#000,#1a0033,#000);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    z-index:2;
}

h1{
    font-size:70px;
    color:#fff;
    text-shadow:0 0 20px #ff4d88;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

p{
    color:#ddd;
    font-size:22px;
    margin-bottom:35px;
}

button{
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#ff4d88;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px #ff4d88;
}

#sorryContainer{
    margin-top:35px;
}

.word{
    display:inline-block;
    margin:8px;
    font-size:26px;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
    }
}

.heart{
    position:absolute;
    color:#ff4d88;
    animation:rise linear forwards;
}

@keyframes rise{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="container">

<h1>🥺 I'm Sorry ❤️</h1>

<p>Every click creates another heartfelt apology.</p>

<button onclick="generate()">Forgive Me 🙏</button>

<div id="sorryContainer"></div>

</div>

<script>

const emojis=["🥺","❤️","💔","🙏","✨","🌹","🤍","💖","😔","🫶"];

const colors=[
"#ff4d88",
"#ffffff",
"#ff99cc",
"#ff6699",
"#ff3366",
"#ffd6e7"
];

function generate(){

const container=document.getElementById("sorryContainer");

container.innerHTML="";

for(let i=1;i<=40;i++){

const span=document.createElement("span");

span.className="word";

span.style.color=colors[Math.floor(Math.random()*colors.length)];

span.style.fontSize=(20+Math.random()*25)+"px";

span.style.transform=`rotate(${Math.random()*30-15}deg)`;

span.innerHTML=`${emojis[Math.floor(Math.random()*emojis.length)]} Sorry ${i} ${emojis[Math.floor(Math.random()*emojis.length)]}`;

container.appendChild(span);

}

for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},9000);

}

}

</script>

</body>
</html>
```
